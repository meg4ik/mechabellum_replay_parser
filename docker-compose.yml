services:
  core-api:
    build: .
    env_file:
      - .env
    environment:
      # Always use asyncpg driver and the Docker-internal postgres hostname.
      # Overrides any DATABASE_URL from .env that might lack the driver or use localhost.
      DATABASE_URL: "postgresql+asyncpg://mechabellum:mechabellum@postgres:5432/mechabellum"
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: "${MECHABELLUM_REPLAY_DIR}"
        target: /data/replays
      - type: bind
        source: ./game_knowledge.md
        target: /app/game_knowledge.md
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mechabellum
      POSTGRES_USER: mechabellum
      POSTGRES_PASSWORD: mechabellum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mechabellum"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
